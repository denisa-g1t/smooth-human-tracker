<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Human Tracker Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #fff; text-align: center; }
#video-frame { border: 2px solid #fff; }
.menu { margin: 10px; }
.menu button { padding: 10px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
.menu button:hover { background: #333; color: #0f0; }
#info { margin-top: 15px; font-size: 20px; }
</style>
</head>
<body>
<h1>Human Tracker Dashboard</h1>

<div class="menu">
  <button onclick="showStatus()">Mood Detection</button>
  <button onclick="showDetection()">Detection Info</button>
  <button onclick="showFront()">What's in front</button>
</div>

<img id="video-frame" width="640" height="480"/>
<div id="info"></div>

<script>
const socket = io();

socket.on('frame', data => {
    document.getElementById('video-frame').src = 'data:image/jpeg;base64,' + data;
});

function showStatus() {
    document.getElementById('info').innerText = "Mood: 😊 Green if happy, 😐 Red if not";
}

function showDetection() {
    document.getElementById('info').innerText = "Detection: Human body count tracked in real-time";
}

function showFront() {
    document.getElementById('info').innerText = "Front View: Textual description coming soon!";
}
</script>
</body>
</html>
