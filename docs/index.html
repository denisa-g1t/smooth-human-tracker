<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Tracker AI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0a0a0a; color:#fff; display:flex; height:100vh; }
.sidebar { width:220px; background:#111; padding:30px 15px; border-right:1px solid #222; }
.logo { font-size:20px; font-weight:700; margin-bottom:30px; color:#fff; }
.logo span { color:#0a84ff; }
.menu-item { padding:12px 15px; border-radius:10px; cursor:pointer; font-size:14px; color:#aaa; margin-bottom:8px; transition:all 0.2s; }
.menu-item:hover,.menu-item.active { background:#1c1c1e; color:#0a84ff; }
.main { flex:1; padding:30px; overflow-y:auto; }
.header { font-size:26px; font-weight:700; margin-bottom:25px; }
.card { background:#1c1c1e; border-radius:16px; padding:25px; margin-bottom:20px; }
.card h3 { font-size:13px; color:#888; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px; }
.stat-number { font-size:60px; font-weight:700; color:#0a84ff; text-align:center; }
.stat-label { font-size:13px; color:#888; text-align:center; margin-top:5px; }
.panel { display:none; }
.panel.active { display:block; }
.dot { width:8px; height:8px; border-radius:50%; background:#30d158; display:inline-block; margin-right:8px; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.mood-box { text-align:center; padding:30px; }
.mood-emoji { font-size:80px; }
.mood-bar { height:10px; border-radius:5px; margin-top:20px; transition:background 1s; }
.green { background:#30d158; }
.red { background:#ff453a; }
.objects-box { font-size:16px; line-height:2; color:#ddd; padding:10px; }
.badge { display:inline-block; background:#2c2c2e; padding:6px 14px; border-radius:20px; margin:4px; font-size:14px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🧠 <span>RoomAI</span></div>
  <div class="menu-item active" onclick="show('detection',this)">👁 Detection</div>
  <div class="menu-item" onclick="show('mood',this)">😊 Mood</div>
  <div class="menu-item" onclick="show('objects',this)">📦 What's in front</div>
</div>

<div class="main">
  <div class="header"><span class="dot"></span>Live Room Monitor</div>

  <div id="detection" class="panel active">
    <div class="card">
      <h3>📊 People Detected</h3>
      <div class="stat-number" id="count">1</div>
      <div class="stat-label">Person in room</div>
    </div>
    <div class="card">
      <h3>📹 Camera Status</h3>
      <div style="color:#30d158;font-size:18px;text-align:center;padding:20px;">
        ● LIVE — Tracking Active
      </div>
    </div>
  </div>

  <div id="mood" class="panel">
    <div class="card">
      <h3>😊 Mood Detection</h3>
      <div class="mood-box">
        <div class="mood-emoji" id="emoji">😊</div>
        <div style="font-size:22px;margin-top:15px;" id="mood-text">Happy</div>
        <div class="mood-bar green" id="mood-bar"></div>
      </div>
    </div>
  </div>

  <div id="objects" class="panel">
    <div class="card">
      <h3>📦 What's in front of me</h3>
      <div class="objects-box">
        <span class="badge">👤 Person</span>
        <span class="badge">💻 Laptop</span>
        <span class="badge">📱 Phone</span>
        <span class="badge">☕ Cup</span>
        <span class="badge">📚 Book</span>
      </div>
    </div>
  </div>

</div>

<script>
function show(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}
</script>
</body>
</html>
